<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MurMur 3D Cyber Network</title>
  <style>
    :root {
      --bg: #030711;
      --line: #4ea3ff;
      --node: #8fd3ff;
      --text: #e8f4ff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #102b5d, var(--bg) 55%, #02040a 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 18px;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 14px;
    }

    .hud {
      border: 1px solid rgba(78, 163, 255, 0.35);
      background: rgba(8, 18, 36, 0.82);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    canvas {
      width: 100%;
      min-height: 580px;
      border-radius: 12px;
      border: 1px solid rgba(78, 163, 255, 0.3);
      background: rgba(4, 10, 21, 0.92);
      display: block;
    }

    .pill {
      border: 1px solid rgba(78, 163, 255, 0.35);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.8rem;
      color: #b8ddff;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hud">
      <strong>3D Cyber Network Topology</strong>
      <span class="pill">Drag: rotate · Scroll: zoom</span>
    </header>
    <canvas id="scene" width="1200" height="700" aria-label="3D network visualization"></canvas>
  </main>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const nodes = [
      { id: 'EDGE', x: -240, y: -80, z: -40 },
      { id: 'SOC', x: -40, y: 10, z: 40 },
      { id: 'SIEM', x: 120, y: 110, z: 10 },
      { id: 'WAF', x: 190, y: -120, z: 70 },
      { id: 'IAM', x: 280, y: -20, z: -40 },
      { id: 'DR', x: 360, y: 120, z: 90 }
    ];

    const links = [
      ['EDGE', 'SOC'],
      ['SOC', 'SIEM'],
      ['SOC', 'WAF'],
      ['WAF', 'IAM'],
      ['SIEM', 'IAM'],
      ['SIEM', 'DR']
    ];

    let rotY = 0.75;
    let rotX = -0.22;
    let zoom = 1;
    let dragging = false;
    let lx = 0;
    let ly = 0;

    function project(point) {
      let { x, y, z } = point;

      const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
      const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

      const x1 = x * cosY - z * sinY;
      const z1 = x * sinY + z * cosY;

      const y2 = y * cosX - z1 * sinX;
      const z2 = y * sinX + z1 * cosX;

      const depth = 680 / (680 + z2 * zoom);
      const sx = canvas.width / 2 + x1 * depth * zoom;
      const sy = canvas.height / 2 + y2 * depth * zoom;

      return { sx, sy, depth, z: z2 };
    }

    function getNode(id) {
      return nodes.find(n => n.id === id);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(7, 16, 32, 0.8)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const projected = nodes.map(n => ({ ...n, ...project(n) }));

      ctx.strokeStyle = 'rgba(78, 163, 255, 0.45)';
      ctx.lineWidth = 1.8;
      for (const [a, b] of links) {
        const na = projected.find(n => n.id === a);
        const nb = projected.find(n => n.id === b);
        ctx.beginPath();
        ctx.moveTo(na.sx, na.sy);
        ctx.lineTo(nb.sx, nb.sy);
        ctx.stroke();
      }

      projected.sort((a, b) => a.z - b.z);

      for (const node of projected) {
        const radius = Math.max(8, 20 * node.depth);

        const glow = ctx.createRadialGradient(node.sx, node.sy, 0, node.sx, node.sy, radius * 2.3);
        glow.addColorStop(0, 'rgba(143, 211, 255, 0.45)');
        glow.addColorStop(1, 'rgba(143, 211, 255, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(node.sx, node.sy, radius * 2.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#8fd3ff';
        ctx.beginPath();
        ctx.arc(node.sx, node.sy, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#e8f4ff';
        ctx.font = `600 ${Math.max(11, 14 * node.depth)}px Inter, sans-serif`;
        ctx.fillText(node.id, node.sx + radius + 6, node.sy + 4);
      }

      requestAnimationFrame(draw);
    }

    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      lx = e.clientX;
      ly = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lx;
      const dy = e.clientY - ly;
      rotY += dx * 0.006;
      rotX += dy * 0.006;
      rotX = Math.max(-1.3, Math.min(1.3, rotX));
      lx = e.clientX;
      ly = e.clientY;
    });

    const stop = () => { dragging = false; };
    canvas.addEventListener('pointerup', stop);
    canvas.addEventListener('pointercancel', stop);
    canvas.addEventListener('pointerleave', stop);

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom += e.deltaY > 0 ? -0.08 : 0.08;
      zoom = Math.max(0.55, Math.min(1.9, zoom));
    }, { passive: false });

    draw();
  </script>
</body>
</html>
