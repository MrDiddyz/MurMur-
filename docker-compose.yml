services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: murmur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d murmur"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      WEB_PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    command: sh -c "pnpm install && pnpm --filter @murmur/web dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
      - web_root_node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/murmur?schema=public
      REDIS_URL: redis://redis:6379
    command: sh -c "pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/db prisma:push && pnpm --filter @murmur/api dev"
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/apps/api/node_modules
      - api_root_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/murmur?schema=public
      REDIS_URL: redis://redis:6379
      ORCHESTRATOR_URL: http://orchestrator:4001
      API_INTERNAL_URL: http://api:4000
    command: sh -c "pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/worker dev"
    volumes:
      - .:/workspace
      - worker_node_modules:/workspace/apps/worker/node_modules
      - worker_root_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      ORCHESTRATOR_PORT: 4001
    command: sh -c "pnpm install && pnpm --filter @murmur/orchestrator dev"
    ports:
      - "4001:4001"
    volumes:
      - .:/workspace
      - orchestrator_node_modules:/workspace/apps/orchestrator/node_modules
      - orchestrator_root_node_modules:/workspace/node_modules

  tool-executor:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      TOOL_EXECUTOR_PORT: 4002
    command: sh -c "pnpm install && pnpm --filter @murmur/tool-executor dev"
    ports:
      - "4002:4002"
    volumes:
      - .:/workspace
      - tool_executor_node_modules:/workspace/apps/tool-executor/node_modules
      - tool_executor_root_node_modules:/workspace/node_modules

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      SANDBOX_PORT: 4003
    command: sh -c "pnpm install && pnpm --filter @murmur/sandbox dev"
    ports:
      - "4003:4003"
    volumes:
      - .:/workspace
      - sandbox_node_modules:/workspace/apps/sandbox/node_modules
      - sandbox_root_node_modules:/workspace/node_modules

  memory-store:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.example
    environment:
      MEMORY_STORE_PORT: 4004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/murmur?schema=public
    command: sh -c "pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/memory-store dev"
    ports:
      - "4004:4004"
    volumes:
      - .:/workspace
      - memory_store_node_modules:/workspace/apps/memory-store/node_modules
      - memory_store_root_node_modules:/workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  web_root_node_modules:
  api_root_node_modules:
  worker_root_node_modules:
  orchestrator_root_node_modules:
  tool_executor_root_node_modules:
  sandbox_root_node_modules:
  memory_store_root_node_modules:
  web_node_modules:
  api_node_modules:
  worker_node_modules:
  orchestrator_node_modules:
  tool_executor_node_modules:
  sandbox_node_modules:
  memory_store_node_modules:
