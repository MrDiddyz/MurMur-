<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="10" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MurMur Offline</title>
  <style>
    body{background:#0b0b0f;color:#eaeaf2;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;display:flex;align-items:center;justify-content:center;height:100vh}
    .box{max-width:720px;padding:32px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.03)}
    h1{margin:0 0 8px 0;font-size:28px;letter-spacing:.2px}
    p{margin:6px 0;opacity:.85;line-height:1.4}
    .small{opacity:.6;font-size:13px;margin-top:18px}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ffcc00;margin-right:8px;vertical-align:middle}
  </style>
</head>
<body>
  <div class="box">
    <h1><span class="dot"></span>MurMur – Offline</h1>
    <p>Skjermen kjører lokalt, men finner ikke gateway akkurat nå.</p>
    <p>Systemet prøver automatisk å koble til igjen.</p>
    <p class="small">Tips: Sjekk strøm, nettverkskabel/Wi-Fi, og at gateway er oppe.</p>
  </div>
</body>
</html>
