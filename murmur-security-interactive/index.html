<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MurMur Security Map</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0a1020;
      color: #d7e1ff;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    header { padding: 14px 18px; border-bottom: 1px solid #1d2a47; background: #101935; }
    .hint { color: #8aa2d8; font-size: 0.9rem; }
    #viewport {
      overflow: hidden;
      position: relative;
      background: radial-gradient(circle at 30% 20%, #172852 0%, #080e1d 60%);
      cursor: grab;
    }
    #viewport.dragging { cursor: grabbing; }
    #map {
      width: 1500px;
      height: 900px;
      transform-origin: 0 0;
      will-change: transform;
      user-select: none;
      pointer-events: none;
    }
    .node { fill: #4af3ff; }
    .edge { stroke: #284a80; stroke-width: 2; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { r: 6; opacity: .7; } 50% { r: 10; opacity: 1; } }
  </style>
</head>
<body>
  <header>
    <strong>MurMur Security — Interactive Attack Surface Map</strong>
    <div class="hint">Scroll to zoom · Drag to pan</div>
  </header>

  <div id="viewport" aria-label="Interactive map viewport">
    <svg id="map" viewBox="0 0 1500 900" role="img" aria-label="Network map">
      <defs>
        <linearGradient id="lineGlow" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%" stop-color="#1c3f75" />
          <stop offset="100%" stop-color="#4af3ff" />
        </linearGradient>
      </defs>

      <rect x="0" y="0" width="1500" height="900" fill="transparent" />

      <g stroke="url(#lineGlow)" stroke-width="2.2" opacity="0.85">
        <line class="edge" x1="240" y1="180" x2="520" y2="260" />
        <line class="edge" x1="520" y1="260" x2="840" y2="340" />
        <line class="edge" x1="840" y1="340" x2="1180" y2="520" />
        <line class="edge" x1="520" y1="260" x2="620" y2="570" />
        <line class="edge" x1="620" y1="570" x2="900" y2="680" />
        <line class="edge" x1="240" y1="180" x2="310" y2="520" />
      </g>

      <g>
        <circle class="node pulse" cx="240" cy="180" r="7" />
        <circle class="node pulse" cx="520" cy="260" r="7" style="animation-delay:.2s" />
        <circle class="node pulse" cx="840" cy="340" r="7" style="animation-delay:.5s" />
        <circle class="node pulse" cx="1180" cy="520" r="7" style="animation-delay:.9s" />
        <circle class="node pulse" cx="620" cy="570" r="7" style="animation-delay:1.1s" />
        <circle class="node pulse" cx="900" cy="680" r="7" style="animation-delay:1.4s" />
        <circle class="node pulse" cx="310" cy="520" r="7" style="animation-delay:1.8s" />
      </g>

      <g fill="#d7e1ff" font-size="18" font-family="Inter, sans-serif">
        <text x="260" y="172">Perimeter Gateway</text>
        <text x="540" y="250">WAF Cluster</text>
        <text x="860" y="330">SOC Correlator</text>
        <text x="1200" y="512">SIEM Lake</text>
        <text x="640" y="562">Identity Node</text>
      </g>
    </svg>
  </div>

  <script>
    const viewport = document.getElementById('viewport');
    const map = document.getElementById('map');

    let scale = 1;
    let panX = 0;
    let panY = 0;
    let dragging = false;
    let startX = 0;
    let startY = 0;

    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

    function render() {
      map.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    viewport.addEventListener('wheel', (event) => {
      event.preventDefault();
      const zoomFactor = event.deltaY < 0 ? 1.08 : 0.92;
      const nextScale = clamp(scale * zoomFactor, 0.45, 2.5);

      const rect = viewport.getBoundingClientRect();
      const cursorX = event.clientX - rect.left;
      const cursorY = event.clientY - rect.top;

      panX = cursorX - ((cursorX - panX) * (nextScale / scale));
      panY = cursorY - ((cursorY - panY) * (nextScale / scale));
      scale = nextScale;
      render();
    }, { passive: false });

    viewport.addEventListener('pointerdown', (event) => {
      dragging = true;
      viewport.classList.add('dragging');
      startX = event.clientX - panX;
      startY = event.clientY - panY;
      viewport.setPointerCapture(event.pointerId);
    });

    viewport.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      panX = event.clientX - startX;
      panY = event.clientY - startY;
      render();
    });

    function stopDrag(event) {
      if (!dragging) return;
      dragging = false;
      viewport.classList.remove('dragging');
      if (event?.pointerId !== undefined) {
        viewport.releasePointerCapture(event.pointerId);
      }
    }

    viewport.addEventListener('pointerup', stopDrag);
    viewport.addEventListener('pointercancel', stopDrag);

    render();
  </script>
</body>
</html>
