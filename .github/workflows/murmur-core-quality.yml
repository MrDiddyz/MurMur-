name: murmur-core-quality

on:
  push:
    paths:
      - 'murmur-core/services/core/**'
  pull_request:
    paths:
      - 'murmur-core/services/core/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: murmur-core/services/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: make quality
