<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Star Defender</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Star Defender</h1>
        <p>Move with ← → or A D. Press Space to shoot. On iPhone: use touch controls.</p>
      </header>
      <section class="hud">
        <span id="score">Score: 0</span>
        <span id="lives">Lives: 3</span>
        <span id="level">Level: 1</span>
      </section>
      <canvas id="game" width="800" height="500" aria-label="Star Defender game canvas"></canvas>

      <section class="touch-controls" aria-label="Touch controls">
        <button id="touch-left" class="touch-btn" aria-label="Move left">◀</button>
        <button id="touch-shoot" class="touch-btn touch-btn--shoot" aria-label="Shoot">● FIRE</button>
        <button id="touch-right" class="touch-btn" aria-label="Move right">▶</button>
      </section>

      <section id="overlay" class="overlay hidden">
        <div>
          <h2 id="overlay-title">Game Over</h2>
          <p id="overlay-message"></p>
          <button id="restart">Restart</button>
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
