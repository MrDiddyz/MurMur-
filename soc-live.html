<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MurMur</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
color:white;
}

/* ===== STAR FIELD ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ===== CENTER CORE ===== */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* ===== IMPOSSIBLE CUBE ===== */
.cube{
width:200px;
height:200px;
transform-style:preserve-3d;
animation:rotateCube 12s infinite linear;
margin:auto;
cursor:pointer;
}

.face{
position:absolute;
width:200px;
height:200px;
background:rgba(0,255,255,0.08);
border:1px solid rgba(0,255,255,0.6);
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(5px);
}

.front{transform:translateZ(100px);}
.back{transform:rotateY(180deg) translateZ(100px);}
.right{transform:rotateY(90deg) translateZ(100px);}
.left{transform:rotateY(-90deg) translateZ(100px);}
.top{transform:rotateX(90deg) translateZ(100px);}
.bottom{transform:rotateX(-90deg) translateZ(100px);}

@keyframes rotateCube{
0%{transform:rotateX(0deg) rotateY(0deg);}
100%{transform:rotateX(360deg) rotateY(360deg);}
}

/* ===== UI BUTTON ===== */
button{
margin-top:25px;
padding:12px 30px;
background:transparent;
border:1px solid cyan;
color:white;
cursor:pointer;
}

/* ===== HIDDEN MODULE ===== */
.module{
margin-top:20px;
display:none;
font-size:18px;
color:#00ffff;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="center">

<h1>MurMur</h1>
<p>The Living Intelligence Constellation</p>

<div class="cube" onclick="unlockModule()">
<div class="face front">Module</div>
<div class="face back">AI</div>
<div class="face right">Core</div>
<div class="face left">Access</div>
<div class="face top">Evolution</div>
<div class="face bottom">∞</div>
</div>

<button onclick="simulatePayment()">Unlock Module</button>

<div class="module" id="module">
Module Activated
<br><br>
Access Path Opened
<br><br>
MurMur Core requires voluntary testing.
</div>

</div>

<script>

/* ===== STARFIELD ===== */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

/* ===== SHOOTING STAR LOOP ===== */
function shootingStar(){
let x=Math.random()*canvas.width;
let y=0;

let interval=setInterval(()=>{
ctx.strokeStyle="white";
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x+80,y+20);
ctx.stroke();
x+=15;
y+=5;
if(y>canvas.height) clearInterval(interval);
},20);
}

setInterval(shootingStar,10000);

/* ===== PAYMENT SIM ===== */
let paid=false;

function simulatePayment(){
paid=true;
alert("Payment Confirmed — Module Path Opening");
}

/* ===== MODULE UNLOCK ===== */
function unlockModule(){
if(!paid){
alert("Module locked — complete payment first");
return;
}
document.getElementById("module").style.display="block";
}

</script>

</body>
</html>
