version: "3.9"
services:
  db:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: murmur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: murmur_db

  migrator:
    image: postgres:15
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: murmur
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: murmur_db
      MIGRATIONS_DIR: /database/migrations
    volumes:
      - ./scripts:/scripts:ro
      - ./database:/database:ro
    entrypoint: ["/bin/sh", "-c", "chmod +x /scripts/migrate.sh && /scripts/migrate.sh"]
