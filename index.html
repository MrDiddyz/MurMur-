<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MurMur Prompt Lab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>MurMur Prompt Lab</h1>
      <p class="subtitle">Generate and remix AI-ready music prompts in one click.</p>

      <section class="controls">
        <button id="generateBtn">Generate Prompt</button>
        <button id="remixBtn" disabled>Remix Prompt</button>
        <button id="copyBtn" disabled>Copy Prompt</button>
      </section>

      <section class="output" aria-live="polite">
        <label for="promptOutput">Generated prompt</label>
        <textarea id="promptOutput" readonly placeholder="Your music prompt appears here..."></textarea>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
