services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: murmur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: murmur_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - db

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
