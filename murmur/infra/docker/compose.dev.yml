services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: ai_agent_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        SERVICE_NAME: ./apps/api
    environment: &default_env
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:CHANGE_ME@postgres:5432/ai_agent_platform?schema=public}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL:-http://orchestrator:3003}
      REVIEW_GATE_URL: ${REVIEW_GATE_URL:-http://review-gate:3010}
      REPO_MANAGER_URL: ${REPO_MANAGER_URL:-http://repo-manager:3007}
      SANDBOX_URL: ${SANDBOX_URL:-http://sandbox:3005}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web:3000}
      WORKER_ID: ${WORKER_ID:-worker-prod-1}
      REPO_STORAGE_ROOT: ${REPO_STORAGE_ROOT:-/tmp/ai-agent-platform/repos}
      SANDBOX_ROOT: ${SANDBOX_ROOT:-/tmp/ai-agent-platform/sandboxes}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-CHANGE_ME_INTERNAL_KEY}
    depends_on:
      - postgres
      - redis
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      args:
        SERVICE_NAME: ./apps/web
    environment:
      <<: *default_env
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

  planner-worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        SERVICE_NAME: ./workers/planner-worker
    environment:
      <<: *default_env
    depends_on:
      - redis
      - api

  reviewer-worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        SERVICE_NAME: ./workers/reviewer-worker
    environment:
      <<: *default_env
    depends_on:
      - redis
      - api

  builder-worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        SERVICE_NAME: ./workers/builder-worker
    environment:
      <<: *default_env
    depends_on:
      - redis
      - api

  optimizer-worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        SERVICE_NAME: ./workers/optimizer-worker
    environment:
      <<: *default_env
    depends_on:
      - redis
      - api

  memory-worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        SERVICE_NAME: ./workers/memory-worker
    environment:
      <<: *default_env
    depends_on:
      - redis
      - api

volumes:
  postgres_data:
