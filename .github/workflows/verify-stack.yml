name: verify-stack

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Verify migrations stack
        run: docker compose -f docker-compose.verify.yml --env-file .env up --abort-on-container-exit --exit-code-from migrator
