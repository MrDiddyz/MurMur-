<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MurMur Cloud Terminal live operational status" />
  <title>MurMur Cloud Terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070f;
      --panel: #0d1426;
      --border: #203257;
      --text: #d8e6ff;
      --muted: #8ea7d5;
      --ok: #2dd4bf;
      --ok-soft: rgba(45, 212, 191, 0.15);
      --accent: #66b2ff;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 10% 10%, rgba(102, 178, 255, 0.16), transparent 35%),
        radial-gradient(circle at 90% 90%, rgba(45, 212, 191, 0.14), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.5;
    }

    main {
      width: min(760px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(13, 20, 38, 0.95), rgba(8, 13, 25, 0.95));
      box-shadow: 0 24px 50px var(--shadow);
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 12, 24, 0.8);
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.2rem);
      letter-spacing: 0.02em;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid color-mix(in srgb, var(--ok) 55%, black);
      border-radius: 999px;
      background: var(--ok-soft);
      color: var(--ok);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 12px var(--ok);
      animation: pulse 1.5s infinite ease-in-out;
    }

    .content {
      padding: 22px 20px;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    code {
      color: var(--accent);
      background: rgba(102, 178, 255, 0.08);
      border: 1px solid rgba(102, 178, 255, 0.2);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 0.9em;
    }

    .meta {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
      display: grid;
      gap: 6px;
      font-size: 0.85rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.75); opacity: 0.65; }
    }
  </style>
</head>
<body>
  <main aria-live="polite">
    <header class="header">
      <h1 class="title">MurMur Cloud Terminal</h1>
      <span class="status-badge"><span class="status-dot" aria-hidden="true"></span>Live</span>
    </header>

    <section class="content">
      <p><strong>MurMur Cloud Terminal is live.</strong></p>
      <p>Autonomous compute infrastructure running and accepting workloads.</p>
      <div class="meta">
        <span>System Mode: <code>operational</code></span>
        <span>Last Updated: <time id="last-updated"></time></span>
      </div>
    </section>
  </main>

  <script>
    const timeEl = document.getElementById('last-updated');
    timeEl.textContent = new Date().toISOString();
  </script>
</body>
</html>
