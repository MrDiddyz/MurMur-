<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MurMur Trending Prompts</title>
    <style>
      :root {
        --bg: #070b14;
        --panel: #121b2d;
        --text: #eaf2ff;
        --muted: #9fb1d7;
        --accent: #6ab7ff;
        --border: rgba(132, 176, 255, 0.3);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #16274a 0%, #090f1f 35%, var(--bg) 75%);
      }
      main {
        width: min(980px, 100%);
        margin: 0 auto;
        padding: 28px 16px 48px;
      }
      h1 { margin: 0; letter-spacing: -0.02em; }
      p { color: var(--muted); }
      .grid {
        margin-top: 18px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: linear-gradient(155deg, rgba(20, 31, 54, 0.95), rgba(9, 15, 29, 0.95));
        box-shadow: 0 14px 30px rgba(4, 8, 18, 0.45);
      }
      .tag {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 8px;
        color: var(--accent);
      }
      h2 { margin: 10px 0 8px; font-size: 1rem; }
      .preview { margin: 0 0 12px; font-size: 0.93rem; line-height: 1.45; }
      button {
        border: 1px solid var(--border);
        background: linear-gradient(180deg, #7fc3ff, #448ff1);
        color: #07142a;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Trending in MurMur</h1>
      <p>Mock prompt ideas creators are remixing this week.</p>
      <section id="grid" class="grid" aria-label="Trending prompts"></section>
    </main>

    <script>
      const data = [
        { title: 'Velvet Midnight Drive', preview: 'Write a synth-heavy neo-noir track with pulsing bass, smoky vocals, and a chorus built for replay value.', vibe: 'Nightwave' },
        { title: 'Mountain Sun Lift', preview: 'Create an uplifting indie-electronic arrangement with acoustic textures and soaring post-chorus leads.', vibe: 'Cinematic Hope' },
        { title: 'Streetlight Confession', preview: 'Generate late-night R&B lyrics with vulnerable storytelling, subtle melodic runs, and sparse drums.', vibe: 'Intimate' },
        { title: 'Arena Pulse Cut', preview: 'Plan a high-energy EDM drop with tension ramps, snare lifts, and a clean melodic payoff.', vibe: 'Festival' },
        { title: 'Quiet Orbit', preview: 'Build ambient lo-fi layers for focus sessions with tape texture, soft piano, and filtered noise beds.', vibe: 'Focus' }
      ];

      const grid = document.getElementById('grid');

      function copy(text, button) {
        navigator.clipboard.writeText(text).then(() => {
          const original = button.textContent;
          button.textContent = 'Copied';
          setTimeout(() => { button.textContent = original; }, 1000);
        });
      }

      data.forEach((item) => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <span class="tag">${item.vibe}</span>
          <h2>${item.title}</h2>
          <p class="preview">${item.preview}</p>
          <button type="button">Copy prompt</button>
        `;
        const button = card.querySelector('button');
        button.addEventListener('click', () => copy(`${item.title}\n\n${item.preview}`, button));
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
