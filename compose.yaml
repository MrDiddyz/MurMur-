services:
  murmurweb:
    image: murmurweb
    build:
      context: murmur-stronghold/murmur-web
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENV: production
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - 8000:8000
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: murmur
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: murmur_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

volumes:
  pgdata:
