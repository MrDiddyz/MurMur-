<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MurMur SOC Live Feed</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060b14;
      --panel: #0b1426;
      --line: rgba(102, 178, 255, 0.25);
      --text: #dbeaff;
      --ok: #2dd4bf;
      --warn: #f59e0b;
      --high: #f87171;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0a1330, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      min-height: 100vh;
      padding: 22px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(11, 20, 38, 0.86);
      padding: 14px;
      backdrop-filter: blur(8px);
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 1.2rem; }

    #status {
      font-size: 0.85rem;
      opacity: 0.9;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 0.92rem;
    }

    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(102, 178, 255, 0.15);
      vertical-align: top;
    }

    th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.85;
    }

    .badge {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      border: 1px solid currentColor;
    }

    .sev-low { color: var(--ok); }
    .sev-medium { color: var(--warn); }
    .sev-high { color: var(--high); }

    .hint {
      font-size: 0.86rem;
      opacity: 0.88;
      line-height: 1.4;
    }

    code { color: #9dd4ff; }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel head">
      <h1>Live SOC Event Stream</h1>
      <span id="status">Initializing…</span>
    </section>

    <section class="panel hint">
      Listening to Supabase realtime events on table <code>soc_events</code>. Update <code>config.js</code> with your project URL and anon key.
    </section>

    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Source</th>
            <th>Event</th>
            <th>Severity</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="event-body"></tbody>
      </table>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const eventBody = document.getElementById('event-body');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function severityClass(level = '') {
      const normalized = String(level).toLowerCase();
      if (normalized === 'high' || normalized === 'critical') return 'sev-high';
      if (normalized === 'medium' || normalized === 'moderate') return 'sev-medium';
      return 'sev-low';
    }

    function addRow(eventData) {
      const row = document.createElement('tr');
      const timestamp = eventData.created_at || new Date().toISOString();
      const date = new Date(timestamp);
      const source = eventData.source || 'unknown';
      const name = eventData.event_name || eventData.type || 'event';
      const severity = eventData.severity || 'low';
      const details = eventData.details || eventData.message || '-';

      row.innerHTML = `
        <td>${date.toLocaleString()}</td>
        <td>${source}</td>
        <td>${name}</td>
        <td><span class="badge ${severityClass(severity)}">${String(severity).toUpperCase()}</span></td>
        <td>${details}</td>
      `;

      eventBody.prepend(row);

      while (eventBody.children.length > 100) {
        eventBody.removeChild(eventBody.lastChild);
      }
    }

    const cfg = window.SUPABASE_CONFIG;
    if (!cfg || !cfg.url || !cfg.anonKey || cfg.url.includes('YOUR-PROJECT')) {
      setStatus('Config missing: update config.js');
      addRow({
        source: 'local',
        event_name: 'configuration_required',
        severity: 'medium',
        details: 'Set SUPABASE_CONFIG.url and SUPABASE_CONFIG.anonKey in config.js'
      });
    } else {
      const supabase = window.supabase.createClient(cfg.url, cfg.anonKey);
      setStatus('Connected · waiting for realtime events…');

      supabase
        .channel('soc-live-feed')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'soc_events'
        }, payload => {
          addRow(payload.new || payload.old || payload);
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            setStatus('Subscribed to public.soc_events');
          } else {
            setStatus(`Realtime status: ${status}`);
          }
        });

      supabase
        .from('soc_events')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(20)
        .then(({ data, error }) => {
          if (error) {
            addRow({ source: 'supabase', event_name: 'load_error', severity: 'high', details: error.message });
            return;
          }
          (data || []).forEach(addRow);
        });
    }
  </script>
</body>
</html>
