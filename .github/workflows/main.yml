name: MurMur CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check lockfile sync
        run: |
          cp package-lock.json package-lock.json.bak
          npm install --package-lock-only --silent
          if ! diff -q package-lock.json package-lock.json.bak > /dev/null 2>&1; then
            echo "::error::package-lock.json is out of sync with package.json."
            echo "::error::Run 'npm install --package-lock-only' locally and commit the updated package-lock.json."
            cp package-lock.json.bak package-lock.json
            exit 1
          fi
          rm package-lock.json.bak

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
