services:
  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/web dev"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:10000
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/node_modules
    depends_on:
      - api

  api:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/db prisma:migrate:deploy && pnpm --filter @murmur/api dev"
    ports:
      - "10000:10000"
    env_file: .env
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/node_modules
    depends_on:
      - redis
      - postgres

  worker:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/worker dev"
    env_file: .env
    volumes:
      - ./:/workspace
      - worker_node_modules:/workspace/node_modules
    depends_on:
      - api
      - orchestrator

  orchestrator:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/orchestrator dev"
    env_file: .env
    volumes:
      - ./:/workspace
      - orchestrator_node_modules:/workspace/node_modules

  tool-executor:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/tool-executor dev"
    env_file: .env
    volumes:
      - ./:/workspace
      - tool_executor_node_modules:/workspace/node_modules

  sandbox:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/sandbox dev"
    env_file: .env
    volumes:
      - ./:/workspace
      - sandbox_node_modules:/workspace/node_modules

  memory-store:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @murmur/db prisma:generate && pnpm --filter @murmur/memory-store dev"
    env_file: .env
    volumes:
      - ./:/workspace
      - memory_store_node_modules:/workspace/node_modules
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: murmur
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  web_node_modules:
  api_node_modules:
  worker_node_modules:
  orchestrator_node_modules:
  tool_executor_node_modules:
  sandbox_node_modules:
  memory_store_node_modules:
